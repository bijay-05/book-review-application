networks:
  dev_net:
    name: book-review-network-dev

volumes:
  dev_db_pg_data:
    name: dev-db-pg-data

services:
  db:
    container_name: dev_db_container
    image: "postgres:16-bookworm"
    environment:
      POSTGRES_USER: "${DATABASE_USERNAME}"
      POSTGRES_PASSWORD: "${DATABASE_PASSWORD}"
      POSTGRES_DB: "${DATABASE_NAME}"
    ports:
      - "5439:5432"
    restart: "${DOCKER_RESTART_POLICY:-unless-stopped}"
    stop_grace_period: "3s"
    volumes:
      - ../dev_db_pg_data:/var/lib/postgresql/data
      - ../dev-db-data/postgres/initdb.d:/docker-entrypoint-initdb.d
    networks:
      - dev_net
    healthcheck:
      test:
        ["CMD-SHELL", "pg_isready -U ${DATABASE_USERNAME} -d ${DATABASE_NAME}"]
      interval: 10s
      retries: 5
      start_period: 30s
      timeout: 10s

  api:
    container_name: dev_api_container
    image: review-api:dev2
    restart: "${DOCKER_RESTART_POLICY:-unless-stopped}"
    env_file:
      - ./.env
    volumes:
      # - ./node_modules:/app/node_modules
      - ./src:/app/src
      - ./prisma:/app/prisma
    # build:
    #   context: .
    #   dockerfile: Dockerfile
    ports:
      - "3001:3001"
    depends_on:
      db:
        condition: service_healthy
    networks:
      - dev_net
